<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeCreative - Page introuvable</title>
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #2563eb;
            --accent-dark: #1d4ed8;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --shadow-lg: 0 20px 50px rgba(0,0,0,0.1);
            --radius-lg: 20px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.1;
            pointer-events: none;
        }
        .bg-orb-1 { width: 500px; height: 500px; background: #2563eb; top: -200px; right: -150px; animation: float 20s ease-in-out infinite; }
        .bg-orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -150px; left: -100px; animation: float 25s ease-in-out infinite reverse; }
        @keyframes float { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,-50px) scale(1.1);} }

        .error-container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .error-message {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 35px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            letter-spacing: 0.3px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.5); }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-outline:hover { background: var(--accent); color: white; }

        .actions { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.3rem; }
            .error-message { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page introuvable</h1>
        <p class="error-message">La page que vous recherchez n'existe pas ou a été déplacée. Vérifiez l'URL ou retournez à l'accueil.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">Retour à l'accueil</a>
            <a href="/dashboard" class="btn btn-outline">Tableau de bord</a>
        </div>
    </div>
</body>
</html>
